upstream php_fpm {
    server php:9000;
}

server {
    listen 8000 default_server;
    listen [::]:8000 default_server;
    server_name _;

    # Your project serves Laravel from root (index.php at /var/www/html).
    root /var/www/html;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64M;

    # Primary Laravel front controller route.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static asset caching.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|ttf|otf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP execution.
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block hidden files and env/config artifacts.
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~* ^/(?:\.env|composer\.(?:json|lock)|artisan|phpunit\.xml|server\.php)$ {
        deny all;
    }

    # Block direct web access to sensitive Laravel directories.
    location ~* ^/(?:app|bootstrap|config|database|resources|routes|storage|tests|vendor)/ {
        deny all;
    }

    # Health endpoint for load balancers.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
